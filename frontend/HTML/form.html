<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>

    <form>
        <label for="fname">First Name</label>
        <input type="text" id="fname" name = "fname"><br>
        <label for="lname">Last Name</label>
        <input type="text" id="lname" name="lname"><br>
        <!-- radio button -->
         <p>Let's learn about something radio button</p>
        <input type="radio" id="html" name="fav_language" value="html">
        <label for="html">HTML</label>
        <input type="radio" id="css" name="fav_language" value="css">
        <label for="css">CSS</label>
        <input type="radio" id="js" name="fav_language" value="javascript">
        <label for="js">javascript</label><br>

        <!-- checkboxes -->
        <p>Let's learn about checkboxes</p>
        <input type="checkbox" id="Vehicle1" name="Vehicle1" value="Bike">
        <label for="Vehicle1">I have a Bike</label>
        <input type="checkbox" id="Vehicle2" name="Vehicle2" value="Car">
        <label for="Vehicle2">I have a Car</label>
        <input type="checkbox" id="Vehicle3" name="Vehicle3" value="Aeroplane">
        <label for="Vehicle3">I don't have a plane</label><br>

        <!-- button -->
        <input type="submit" value="submit">

    </form>

</body>
</html>
